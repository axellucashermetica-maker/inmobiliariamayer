<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmobiliaria Mayer</title>
    <!-- Fuente Carlito desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Carlito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Carlito', sans-serif;
        }
        /* Barra superior */
        header {
            background-color: #006B5F;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .logo {
            font-size: 20px;
        }
        .logo span:first-child {
            font-weight: 400; /* Regular */
        }
        .logo span:last-child {
            font-weight: 700; /* Bold */
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 400;
        }
        nav a:hover {
            text-decoration: underline;
        }
        /* Secciones */
        section {
            padding: 100px 30px 50px; /* margen superior para que no tape la barra */
            min-height: 100vh;
        }
        #inicio { background: #f5f5f5; }
        #propiedades { background: #eaeaea; }
        #contacto { background: #dddddd; }
        /* Botón WhatsApp */
        .whatsapp-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 1001;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span>INMOBILIARIA</span> <span>MAYER</span>
        </div>
        <nav>
            <a href="#inicio">Inicio</a>
            <a href="#propiedades">Propiedades</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>

    <section id="inicio">
        <h1>Bienvenido a Inmobiliaria Mayer</h1>
        <p>Tu lugar para encontrar la propiedad ideal.</p>
    </section>

    <section id="propiedades">
        <h1>Propiedades</h1>
        <p>Aquí se mostrarán las propiedades disponibles.</p>
    </section>

    <section id="contacto">
        <h1>Contacto</h1>
        <p>Escríbenos para más información.</p>
    </section>

    <!-- Botón WhatsApp -->
    <a href="https://wa.me/5491112345678" class="whatsapp-btn" target="_blank">💬</a>
</body>
</html>
