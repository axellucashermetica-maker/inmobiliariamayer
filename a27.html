  <style>
    body {

    }

    .navbar {
      background: #006B5E;
      color: white;

      display: flex;

    .container {
      padding: 30px;

    }

    input, textarea {
      width: 100%;

      margin-top: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #006B5E;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

.carrusel {
  position: relative;
  max-width: 600px;
  margin: auto;
}

.carrusel img {
  width: 100%;
  border-radius: 10px;
}

.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  font-size: 20px;
  padding: 10px;
  cursor: pointer;
}

.prev {
  left: 10px;
}

.next {
  right: 10px;
}
    
  </style>
</head>
  
<script>
  let imagenes = ["casa1.jpg", "casa2.jpg", "casa3.jpg"];
  let indice = 0;

  function mostrarImagen() {
    document.getElementById("imagen").src = imagenes[indice];
  }

  function siguiente() {
    indice = (indice + 1) % imagenes.length;
    mostrarImagen();
  }

  function anterior() {
    indice = (indice - 1 + imagenes.length) % imagenes.length;
    mostrarImagen();
  }
</script>
